<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Luis Vasquez DevOps11 - POC Lambda</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        input, textarea, button { width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; }
        button { background-color: #005A9C; color: white; border: none; cursor: pointer; }
    </style>
    <script>
        // Esta es la variable que inyecta el pipeline
        window.API_URL = "URL_API_PLACEHOLDER";
    </script>
</head>
<body>
    <h2>Contacto Seguros</h2>
    <form id="contactForm">
        <input type="text" id="nombre" placeholder="Nombre completo" required>
        <input type="email" id="email" placeholder="Correo electrónico" required>
        <textarea id="mensaje" placeholder="Su mensaje..." required></textarea>
        <button type="submit">Enviar Solicitud</button>
    </form>
    <p id="respuesta"></p>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Usamos la URL inyectada por el pipeline. Si no está inyectada (fallback), usamos la hardcodeada
            const targetUrl = (window.API_URL && window.API_URL !== "URL_API_PLACEHOLDER") 
                ? window.API_URL 
                : "https://gg7zgr3awcj3m2wppjvkikjzja0qbdak.lambda-url.us-east-2.on.aws/";
            
            const respuestaElemento = document.getElementById('respuesta');
            respuestaElemento.innerText = "Enviando..."; // Feedback visual

            try {
                const datos = {
                    nombre: document.getElementById('nombre').value,
                    email: document.getElementById('email').value,
                    mensaje: document.getElementById('mensaje').value
                };

                const response = await fetch(targetUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                // Convertimos la respuesta a JSON
                const result = await response.json();
                
                // Actualizamos el mensaje en pantalla
                if (response.ok) {
                    respuestaElemento.innerText = result.message;
                    document.getElementById('contactForm').reset(); // Limpiamos el formulario
                } else {
                    respuestaElemento.innerText = "Error: " + (result.message || "No se pudo procesar la solicitud.");
                }

            } catch (error) {
                // Modificación: Esto nos dirá exactamente por qué falla
                console.error("DETALLE DEL ERROR:", error); 
                respuestaElemento.innerText = "Error: " + error.message;
            }
        });
        // build 7
    </script>
</body>
</html>
