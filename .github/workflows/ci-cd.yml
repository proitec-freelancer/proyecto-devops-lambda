name: GitFlow DevOps Pipeline - Multi-Env

on:
  push:
    branches:
      - develop
      - master
    tags:
      - 'v*' # Se activa cuando creas un tag (ej: v1.0.0) para release de producción
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: Análisis de Calidad (Shift Left)
  # ----------------------------------------------------
  sonarcloud_quality_gate:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=proitec-freelancer
            -Dsonar.projectKey=proitec-freelancer_proyecto-devops-lambda
            -Dsonar.sources=backend/,frontend/

  # ----------------------------------------------------
  # JOB 2: IA Code Review (Solo en Pull Requests)             -Dsonar.qualitygate.wait=true 
  # ----------------------------------------------------
  ai_code_review:
    name: AI Automated Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Reviewer
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ----------------------------------------------------
  # JOB 3: Despliegue en TEST (us-east-2)
  # ----------------------------------------------------
  deploy_test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/develop' # Solo se ejecuta al hacer push o merge a develop
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (TEST)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (TEST)
        run: |
          terraform init
          terraform workspace select test || terraform workspace new test
          terraform apply -auto-approve -var="environment=test" -var="aws_region=us-east-2"
        working-directory: ./terraform

  # ----------------------------------------------------
  # JOB 4: Despliegue en PRODUCCIÓN (us-east-1)
  # ----------------------------------------------------
  deploy_prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') # Solo en master o tags de release
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (PROD)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (PROD)
        run: |
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform apply -auto-approve -var="environment=prod" -var="aws_region=us-east-1"
        working-directory: ./terraform