name: HDI DevOps Pipeline - CI/CD & AI Review

on:
  push:
    branches:
      - main
      - master # Agregamos master para que detecte tu rama actual
  pull_request:
    branches:
      - main
      - master # Agregamos master para que detecte tu rama actual
  workflow_dispatch: # ¡Magia DevOps! Esto te permite ejecutar el pipeline con un botón desde la web

jobs:
  # ----------------------------------------------------
  # JOB 1: Análisis de Calidad con SonarCloud
  # ----------------------------------------------------
  sonarcloud_quality_gate:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Requisito para SonarCloud

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Token nativo de GitHub (no debes crearlo)
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # El que configuraste en GitHub Secrets
        with:
          args: >
            -Dsonar.qualitygate.wait=true 
            -Dsonar.organization=proitec-freelancer
            -Dsonar.projectKey=proitec-freelancer_proyecto-devops-lambda
            -Dsonar.sources=backend/,frontend/
            # IMPORTANTE: Reemplaza TU_USUARIO_GITHUB y TU_PROJECT_KEY por los tuyos.

  # ----------------------------------------------------
  # JOB 2: Code Review con Inteligencia Artificial
  # ----------------------------------------------------
  ai_code_review:
    name: AI Automated Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' # Solo actúa cuando haces un Pull Request
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      
      - name: AI Code Reviewer
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: "" # Lo dejamos vacío para no incurrir en gastos de API por ahora.

  # ----------------------------------------------------
  # JOB 3: Validación de Infraestructura como Código
  # ----------------------------------------------------
  terraform_deploy:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate 
    if: github.ref == 'refs/heads/master' # Solo en la rama master
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform