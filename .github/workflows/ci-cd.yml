name: GitFlow DevOps Pipeline - Multi-Env

on:
  push:
    branches:
      - develop
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: Análisis de Calidad
  # ----------------------------------------------------
  sonarcloud_quality_gate:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.ref != 'refs/heads/master' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=true
            -Dsonar.organization=proitec-freelancer
            -Dsonar.projectKey=proitec-freelancer_proyecto-devops-lambda
            -Dsonar.sources=backend/,frontend/

  # ----------------------------------------------------
  # JOB 2: AI Code Review
  # ----------------------------------------------------
  ai_code_review:
    name: AI Automated Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: AI Code Reviewer
        uses: anc95/ChatGPT-CodeReview@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

  # ----------------------------------------------------
  # JOB 3: Despliegue en TEST (us-east-2)
  # ----------------------------------------------------
  deploy_test:
    name: Deploy to TEST
    runs-on: ubuntu-latest # <--- ¡ESTO FALTABA!
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/develop' # Restringido solo a develop
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (TEST)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (TEST)
        id: tf_apply
        run: |
          terraform init
          terraform workspace select -or-create test
          terraform apply -auto-approve -var="environment=test" -var="aws_region=us-east-2"
        working-directory: ./terraform

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        run: |
          npm install
          npm run build
        env:
          VITE_API_ENDPOINT: ${{ steps.tf_apply.outputs.api_url }}

  # ----------------------------------------------------
  # JOB 4: Despliegue en PRODUCCIÓN (us-east-1)
  # ----------------------------------------------------
  deploy_prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (PROD)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (PROD)
        id: tf_apply_prod
        run: |
          terraform init
          terraform workspace select -or-create prod
          terraform apply -auto-approve -var="environment=prod" -var="aws_region=us-east-1"
        working-directory: ./terraform

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend (PROD)
        run: |
          npm install
          npm run build
        env:
          VITE_API_ENDPOINT: ${{ steps.tf_apply_prod.outputs.api_url }}