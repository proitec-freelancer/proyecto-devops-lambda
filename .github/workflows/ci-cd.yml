name: GitFlow DevOps Pipeline - Multi-Env

on:
  push:
    branches:
      - develop
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  # ----------------------------------------------------
  # JOB 1: Análisis de Calidad
  # ----------------------------------------------------
  sonarcloud_quality_gate:
    name: SonarCloud Scan
    runs-on: ubuntu-latest
    continue-on-error: ${{ github.ref != 'refs/heads/master' }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=proitec-freelancer
            -Dsonar.projectKey=proitec-freelancer_proyecto-devops-lambda
            -Dsonar.sources=backend/,frontend/

  # ----------------------------------------------------
  # JOB 2: Despliegue en TEST (us-east-2)
  # ----------------------------------------------------
  deploy_test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (TEST)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (TEST)
        run: |
          terraform init
          terraform workspace select -or-create test
          terraform apply -auto-approve -var="environment=test" -var="aws_region=us-east-2"
        working-directory: ./terraform

      - name: Inyectar URL de la API en index.html
        working-directory: ./terraform
        run: |
          # Reemplaza el placeholder con la URL real generada por Terraform
          sed -i 's|URL_API_PLACEHOLDER|${{ steps.tf_apply.outputs.api_url }}|g' ../frontend/index.html
          
      - name: Sincronizar index.html a S3
        run: |
          # Si usas Terraform para subir el archivo, el simple hecho de haber
          # modificado el archivo localmente hará que Terraform lo detecte y lo suba
          # en el siguiente apply o puedes forzar un apply aquí si es necesario.
          terraform apply -auto-approve -var="environment=test" -var="aws_region=us-east-2"
        working-directory: ./terraform

  # ----------------------------------------------------
  # JOB 3: Despliegue en PRODUCCIÓN (us-east-1)
  # ----------------------------------------------------
  deploy_prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: sonarcloud_quality_gate
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (PROD)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply (PROD)
        run: |
          terraform init
          terraform workspace select -or-create prod
          terraform apply -auto-approve -var="environment=prod" -var="aws_region=us-east-1"
        working-directory: ./terraform

      - name: Inyectar URL de la API en index.html
        working-directory: ./terraform
        run: |
          # Reemplaza el placeholder con la URL real generada por Terraform
          sed -i 's|URL_API_PLACEHOLDER|${{ steps.tf_apply.outputs.api_url }}|g' ../frontend/index.html
          
      - name: Sincronizar index.html a S3
        run: |
          # Si usas Terraform para subir el archivo, el simple hecho de haber
          # modificado el archivo localmente hará que Terraform lo detecte y lo suba
          # en el siguiente apply o puedes forzar un apply aquí si es necesario.
          terraform apply -auto-approve -var="environment=test" -var="aws_region=us-east-2"
        working-directory: ./terraform